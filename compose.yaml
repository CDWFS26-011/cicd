services:

  jenkins:
    build:
      context: ./jenkins
    container_name: jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ci_network
    restart: unless-stopped

  agent1:
    image: jenkins/agent:latest
    container_name: jenkins_agent1
    networks:
      - ci_network
    restart: unless-stopped

  agent2:
    image: jenkins/agent:latest
    container_name: jenkins_agent2
    networks:
      - ci_network
    restart: unless-stopped

  jenkins_cli_setup:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins_cli_setup
    depends_on:
      - jenkins
    volumes:
      - ./jenkins/init_agents.sh:/init_agents.sh
    networks:
      - ci_network
    entrypoint: ["/bin/bash", "/init_agents.sh"]
    restart: "no"

volumes:
  jenkins_home:

networks:
  ci_network:
    driver: bridge
